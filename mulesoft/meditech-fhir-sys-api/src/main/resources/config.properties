# MEDITECH Expanse FHIR R4 System API Configuration
# -----------------------------------------------

# HTTP Listener
http.port=8081

# FHIR Server — MEDITECH Greenfield Workspace (US Core STU6)
# In production: replace with hospital-specific MEDITECH FHIR endpoint
fhir.meditech.host=greenfield-prod-apis.meditech.com
fhir.meditech.port=443
fhir.meditech.basePath=/v2/uscore/STU6

# Test Patient — Sarai Mccall (cardiac profile)
fhir.meditech.patient.id=0218f2d0-968b-5888-976f-68a554670f6e
fhir.meditech.patient.count=10

# OAuth 2.0 (Authorization Code Grant — refresh_token flow)
# These 3 values MUST be set as Protected Properties in CloudHub 2.0 Runtime Manager.
# They override these placeholders at deploy time.
fhir.meditech.oauth.clientId=${MEDITECH_CLIENT_ID}
fhir.meditech.oauth.clientSecret=${MEDITECH_CLIENT_SECRET}
# Refresh token split into two properties (CloudHub 1024-char limit per property)
# Concatenated at runtime in the get-oauth-access-token sub-flow
fhir.meditech.oauth.refreshToken.part1=${MEDITECH_REFRESH_TOKEN_P1}
fhir.meditech.oauth.refreshToken.part2=${MEDITECH_REFRESH_TOKEN_P2}
fhir.meditech.oauth.tokenUrl=https://greenfield-prod-apis.meditech.com/oauth/token
# Access token TTL (seconds). MEDITECH returns 899s. Cache slightly less to avoid edge-case expiry.
fhir.meditech.oauth.tokenTtl=840

# Timeouts
fhir.meditech.timeout=10000
fhir.meditech.retryCount=2
