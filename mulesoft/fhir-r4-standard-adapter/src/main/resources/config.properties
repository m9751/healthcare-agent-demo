# FHIR R4 Standard Adapter — System API Configuration
# -----------------------------------------------
# Generic FHIR R4 adapter. Connects to any FHIR R4 compliant server.
# Change the host/port/basePath to point at any EHR with a FHIR endpoint.
# No DataWeave transforms needed — FHIR in, FHIR out.

# HTTP Listener
http.port=8081

# FHIR Server — configurable target
# Default: SMART Health IT public sandbox (open access, synthetic data)
# Replace with any FHIR R4 endpoint: Epic, Cerner, Allscripts, eClinicalWorks, etc.
fhir.target.host=r4.smarthealthit.org
fhir.target.port=443
fhir.target.basePath=

# Patient Cohort Filter
fhir.target.patient.birthdate.start=1940
fhir.target.patient.birthdate.end=1959
fhir.target.patient.count=10

# SMART on FHIR OAuth (enable for production EHR endpoints)
# fhir.target.oauth.clientId=
# fhir.target.oauth.clientSecret=
# fhir.target.oauth.tokenUrl=
# fhir.target.oauth.scopes=patient/*.read user/*.read

# Timeouts
fhir.target.timeout=8000
fhir.target.retryCount=2
