# CareStack FHIR R4 System API Configuration
# -------------------------------------------

# HTTP Listener
http.port=8081

# FHIR Server — CareStack EHR
# In production: replace with actual CareStack FHIR R4 endpoint
fhir.carestack.host=r4.smarthealthit.org
fhir.carestack.port=443
fhir.carestack.basePath=

# Patient Cohort Filter
# CareStack cohort: patients born 1960-1980
fhir.carestack.patient.birthdate.start=1960
fhir.carestack.patient.birthdate.end=1980
fhir.carestack.patient.count=10

# SMART on FHIR OAuth (for production — sandbox uses open access)
# fhir.carestack.oauth.clientId=
# fhir.carestack.oauth.clientSecret=
# fhir.carestack.oauth.tokenUrl=
# fhir.carestack.oauth.scopes=patient/*.read user/*.read

# Timeouts
fhir.carestack.timeout=8000
fhir.carestack.retryCount=2
