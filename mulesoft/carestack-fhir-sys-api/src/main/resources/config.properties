# CareStack Dental PMS System API Configuration
# -----------------------------------------------
# Proprietary REST API — NOT FHIR. DataWeave transforms
# CareStack's custom format into FHIR-compatible responses
# so the Process API gets a uniform interface across all EHRs.

# HTTP Listener
http.port=8081

# CareStack REST API
carestack.host=api.carestack.com
carestack.port=443
carestack.basePath=/api/v1.0

# CareStack Auth (3-header API key model)
# Set these as PROTECTED properties in CloudHub 2.0
carestack.auth.vendorKey=${CARESTACK_VENDOR_KEY}
carestack.auth.accountKey=${CARESTACK_ACCOUNT_KEY}
carestack.auth.accountId=${CARESTACK_ACCOUNT_ID}

# Patient search defaults
carestack.patient.search.limit=10

# Timeouts
carestack.timeout=10000
carestack.retryCount=2
