# Clinical Federation Process API Configuration
# -----------------------------------------------

http.port=8083

# System API — CareStack (downstream)
sysapi.carestack.host=localhost
sysapi.carestack.port=8081
sysapi.carestack.protocol=HTTP
sysapi.carestack.basePath=/api/v1/carestack

# System API — Meditab (downstream)
sysapi.meditab.host=localhost
sysapi.meditab.port=8082
sysapi.meditab.protocol=HTTP
sysapi.meditab.basePath=/api/v1/meditab

# In CloudHub deployment, these become:
# sysapi.carestack.host=carestack-fhir-sys-api.us-w2.cloudhub.io
# sysapi.carestack.port=443
# sysapi.carestack.protocol=HTTPS
# sysapi.meditab.host=meditab-fhir-sys-api.us-w2.cloudhub.io
# sysapi.meditab.port=443
# sysapi.meditab.protocol=HTTPS

# Care Gap Detection
caregap.diabetes.icd10=E11.9
caregap.a1c.loinc=4548-4
caregap.a1c.recency.days=90
caregap.a1c.high.threshold=9.0
caregap.a1c.medium.threshold=7.5
