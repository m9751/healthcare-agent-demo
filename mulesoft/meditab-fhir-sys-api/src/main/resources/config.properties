# Meditab FHIR R4 System API Configuration
# ------------------------------------------

http.port=8082

# FHIR Server — Meditab EHR
fhir.meditab.host=r4.smarthealthit.org
fhir.meditab.port=443
fhir.meditab.basePath=

# Meditab cohort: patients born 1940-1959
fhir.meditab.patient.birthdate.start=1940
fhir.meditab.patient.birthdate.end=1959
fhir.meditab.patient.count=10

# SMART on FHIR OAuth (production)
# fhir.meditab.oauth.clientId=
# fhir.meditab.oauth.clientSecret=
# fhir.meditab.oauth.tokenUrl=

fhir.meditab.timeout=8000
fhir.meditab.retryCount=2
